<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORLD OF HORROR</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<body>
    <header>
        <h1>WORLD OF HORROR</h1>
        <p>Un rompecabezas de terror.</p>
        <img src="img/logo.jpg" alt="Imagen del título del juego." class="logo">
    </header>

    <main>
        <section>
            <h2>SPINE-CHILLING STORY OF SCHOOL SCISSORS</h2>
            <p>
            Este misterio tiene 4 posibles finales.
            </p>

            <img src="img/schoolscissors.jpg" alt="Imagen de unas tijeras en un salón de clases, alusivo  al misterio.">
        </section>
        <section>
            <h2>CURIOUS CASE OF A CONTAGIOUS COMA</h2>
            <p>Este misterio tiene dos posibles finales.
            </p>
            <img src="img/coma.jpg" alt="Imagen de una mujer dormida.">

        </section>

    </main>

    <div id="carouselExample" class="carousel slide">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="img/titlescr.png" class="d-block w-100" alt="Title Screen">
    </div>
    <div class="carousel-item">
      <img src="img/masks.jpg" class="d-block w-100" alt="Masks">
    </div>
    <div class="carousel-item">
      <img src="img/lighthouse.jpg" class="d-block w-100" alt="Lighthouse">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
